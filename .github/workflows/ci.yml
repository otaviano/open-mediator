name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test
          --configuration Release
          --no-build
          --logger trx
          --results-directory TestResults/

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: xUnit Tests
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true

  mutation-test:
    name: Mutation Testing (Stryker)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore

      - name: Run Stryker
        run: dotnet stryker --reporter json --reporter html --reporter progress

      - name: Upload Stryker HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: StrykerOutput/**/mutation-report.html

      - name: Post mutation score as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportDir = 'StrykerOutput';
            const jsonFiles = fs.readdirSync(reportDir, { recursive: true })
              .filter(f => f.endsWith('mutation-report.json'));

            if (jsonFiles.length === 0) {
              console.log('No Stryker JSON report found.');
              return;
            }

            const reportPath = path.join(reportDir, jsonFiles[0]);
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const mutants = Object.values(report.files ?? {}).flatMap(f => f.mutants ?? []);
            const tested = mutants.filter(m => ['Killed', 'Survived', 'Timeout'].includes(m.status));
            const killed = tested.filter(m => ['Killed', 'Timeout'].includes(m.status)).length;
            const score = tested.length > 0 ? ((killed / tested.length) * 100).toFixed(2) : 'N/A';
            const thresholds = { break: 80, low: 85, high: 90 };

            let badge = '🔴';
            if (score >= thresholds.high) badge = '🟢';
            else if (score >= thresholds.low) badge = '🟡';

            const body = [
              `## ${badge} Mutation Testing Report`,
              '',
              `**Mutation Score:** ${score}%`,
              '',
              `| Threshold | Value |`,
              `|---|---|`,
              `| Break | ${thresholds.break}% |`,
              `| Low   | ${thresholds.low}% |`,
              `| High  | ${thresholds.high}% |`,
              '',
              `The full HTML report is available as a [workflow artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if mutation score below threshold
        run: |
          REPORT=$(find StrykerOutput -name 'mutation-report.json' | head -1)
          SCORE=$(python3 -c "
          import json, sys
          data = json.load(open(sys.argv[1]))
          mutants = [m for fi in data.get('files', {}).values() for m in fi.get('mutants', [])]
          tested = [m for m in mutants if m['status'] in ('Killed', 'Survived', 'Timeout')]
          killed = len([m for m in tested if m['status'] in ('Killed', 'Timeout')])
          score = (killed / len(tested) * 100) if tested else 0
          print(f'{score:.2f}')
          " "$REPORT")
          echo "Mutation score: $SCORE%"
          python3 -c "
          score = float('$SCORE')
          if score < 80:
              raise SystemExit(f'Mutation score {score:.2f}% is below the break threshold of 80%')
          "
